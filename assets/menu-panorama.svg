  <path d="M0 496h112v-32h112v-40h128v-24h136v32h112v32h120v24h112v-32h112v-48h120v32h112v40h112v240H0z" fill="url(#dirt)"/>
  <path d="M0 496h112v-32h112v-40h128v-24h136v32h112v32h120v24h112v-32h112v-48h120v32h112v40h112v24h-112v-16h-112v-32H944v48H832v32H720v-24H600v-32H488v-32H352v24H224v40H112v32H0z" fill="#4d913f"/>
  <path d="M0 512h112v-32h112v-40h128v-24h136v32h112v32h120v24h112v-32h112v-48h120v32h112v40h112v16h-112v-40h-112v-32H944v48H832v32H720v-24H600v-32H488v-32H352v24H224v40H112v32H0z" fill="#73b858"/>

  <!-- exposed block stone faces -->
  <path d="M0 600h176v120H0zM224 624h208v96H224zM1016 584h264v136h-264z" fill="url(#stone)"/>

  <!-- trees -->
  <g>
    <g transform="translate(126 456)"><rect x="-12" y="-96" width="24" height="96" fill="#6b472c"/><path d="M-64-80h128v48H-64zM-48-120h96v48h-96zM-32-152h64v40h-64z" fill="#326a38"/><path d="M-48-112h80v16h-80z" fill="#498b42"/></g>
    <g transform="translate(296 416)"><rect x="-12" y="-112" width="24" height="112" fill="#725033"/><path d="M-68-94h136v50H-68zM-52-138h104v52h-104zM-34-174h68v44h-68z" fill="#2c6537"/><path d="M-52-130h88v16h-88z" fill="#4a9146"/></g>
    <g transform="translate(520 456)"><rect x="-10" y="-80" width="20" height="80" fill="#67462e"/><path d="M-52-70h104v40H-52zM-38-104h76v40h-76zM-24-132h48v36h-48z" fill="#397440"/></g>
    <g transform="translate(876 448)"><rect x="-12" y="-104" width="24" height="104" fill="#6d4b2f"/><path d="M-64-88h128v48H-64zM-48-128h96v48h-96zM-32-160h64v40h-64z" fill="#316b3a"/><path d="M-48-120h80v16h-80z" fill="#4c9346"/></g>
    <g transform="translate(1110 472)"><rect x="-12" y="-96" width="24" height="96" fill="#69472d"/><path d="M-60-82h120v46H-60zM-44-120h88v46h-88zM-28-150h56v38h-56z" fill="#2f6938"/></g>
  </g>

  <!-- grass and flowers -->
  <g fill="#2f7037">
    <path d="M38 496v-28h6v14l12-18v32M192 464v-30h6v18l14-20v32M450 432v-28h6v14l12-16v30M650 488v-30h6v16l14-18v32M968 408v-28h6v14l12-18v32M1208 480v-32h6v18l14-20v34"/>
  </g>
  <g fill="#f2d85f"><rect x="184" y="428" width="18" height="18"/><rect x="640" y="452" width="18" height="18"/></g>
  <g fill="#e77a72"><rect x="442" y="392" width="18" height="18"/><rect x="1198" y="442" width="18" height="18"/></g>

  <!-- subtle pixel vignette, still transparent over the illustrated image -->
  <path d="M0 0h1280v720H0z" fill="none" stroke="#07130f" stroke-opacity=".3" stroke-width="32"/>
</svg>
