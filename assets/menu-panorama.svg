  <path d="M0 414h1280v306H0z" fill="url(#water)"/>
  <g fill="#82c0c4" opacity=".7">
    <rect x="24" y="458" width="180" height="8"/><rect x="268" y="504" width="214" height="8"/>
    <rect x="596" y="452" width="170" height="8"/><rect x="846" y="532" width="244" height="8"/>
    <rect x="1054" y="466" width="178" height="8"/><rect x="112" y="610" width="262" height="8"/>
