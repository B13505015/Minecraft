<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title description">
  <title id="title">方塊世界全景</title>
  <desc id="description">有山脈、樹林、草地、河流和夕陽的像素方塊世界。</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f91ca"/>
      <stop offset="0.58" stop-color="#9dc8da"/>
      <stop offset="1" stop-color="#e3c58e"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f9bad"/>
      <stop offset="1" stop-color="#27677f"/>
    </linearGradient>
    <pattern id="stone" width="48" height="48" patternUnits="userSpaceOnUse">
      <rect width="48" height="48" fill="#777b76"/>
      <path d="M0 16h20v4H0M28 0v16h4V0M20 20v28h4V20M24 32h24v4H24" fill="#656963"/>
      <path d="M4 4h14v4H4M30 22h14v4H30M28 40h12v4H28" fill="#92968f"/>
    </pattern>
    <pattern id="dirt" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#79583b"/>
      <path d="M6 8h8v6H6M26 4h6v9h-6M17 25h10v7H17M2 32h7v5H2M32 21h6v6h-6" fill="#62452f"/>
      <path d="M17 5h5v5h-5M7 21h7v5H7M29 31h6v5h-6" fill="#956d49"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" fill="url(#sky)"/>

  <!-- square sun and block-built clouds -->
  <rect x="1016" y="72" width="112" height="112" fill="#ffe3a0" opacity=".28"/>
  <rect x="1032" y="88" width="80" height="80" fill="#fff0b7"/>
  <g fill="#f1f5ef" opacity=".92">
    <path d="M64 126h48V98h80V78h72v20h64v28h52v36H64z"/>
    <path d="M430 72h48V52h72v20h88v22h64v34H430z"/>
    <path d="M724 154h60v-26h74v-18h66v18h92v42H724z"/>
  </g>
  <g fill="#dce8e2" opacity=".86">
    <rect x="64" y="146" width="316" height="16"/>
    <rect x="430" y="112" width="272" height="16"/>
    <rect x="724" y="170" width="292" height="14"/>
  </g>

  <!-- distant square mountains -->
  <path d="M0 396v-44h48v-32h48v-40h48v24h48v-56h48v40h48v-24h48v52h48v36h48v-20h48v64z" fill="#6f8878"/>
  <path d="M420 396v-52h48v-24h48v-56h48v32h48v-72h48v40h48v48h48v-28h48v52h48v60z" fill="#648273"/>
  <path d="M810 396v-48h48v-36h48v16h48v-80h48v32h48v-56h48v72h48v-24h48v48h48v-20h38v96z" fill="#577363"/>
  <g fill="#9caf96" opacity=".72">
    <rect x="96" y="280" width="48" height="24"/><rect x="240" y="248" width="48" height="40"/>
    <rect x="564" y="264" width="48" height="32"/><rect x="660" y="224" width="48" height="40"/>
    <rect x="954" y="248" width="48" height="32"/><rect x="1050" y="224" width="48" height="48"/>
  </g>

  <!-- middle-distance forest -->
  <g fill="#284e38">
    <path d="M0 438h50v-70h22v-64h28v64h26v70h50v-58h20v-74h28v74h34v58h70v-66h22v-92h30v92h34v66z"/>
    <path d="M760 438h58v-72h24v-92h30v92h36v72h58v-62h22v-104h32v104h36v62h54v-54h20v-82h30v82h40v54z"/>
  </g>
  <g fill="#3f7650">
    <rect x="24" y="336" width="112" height="64"/><rect x="166" y="326" width="112" height="72"/>
    <rect x="304" y="306" width="126" height="88"/><rect x="786" y="312" width="126" height="88"/>
    <rect x="944" y="298" width="126" height="98"/><rect x="1110" y="326" width="134" height="76"/>
  </g>

